# OVH performance nginx — static files from disk + gzip; API via Node upstream.
# Install: sudo cp deploy/ovh/nginx-horizon-performance.conf /etc/nginx/sites-available/horizon
#          sudo nginx -t && sudo systemctl reload nginx

upstream horizon_node {
    least_conn;
    server 127.0.0.1:3000;
    keepalive 64;
}

# Sticky-enough: same client IP tends to hit same worker (warms Wasabi in-process cache).
upstream horizon_node_sticky {
    ip_hash;
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /var/log/nginx/horizon-access.log;
    error_log  /var/log/nginx/horizon-error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript application/javascript application/json
        application/xml image/svg+xml font/woff2;

    root /opt/horizon/horizon-frontend;

    # cPanel static (also served by Node; nginx is faster when hit first)
    location ^~ /horizonpipe-cpanel/ {
        alias /opt/horizon/horizon-frontend/horizonpipe-cpanel/;
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /client-portal/ {
        alias /opt/horizon/horizon-frontend/client-portal/;
        try_files $uri $uri/ @node;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Large static assets — serve from disk (not Node). Pre-gzip with install-performance.sh
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2|wasm|map)$ {
        gzip_static on;
        try_files $uri @node;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # HTML shells — short cache (deploy may update without query string)
    location ~* \.html$ {
        try_files $uri @node;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    location /assets/ {
        try_files $uri @node;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ @node;
    }

    location @node {
        proxy_pass http://horizon_node_sticky;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }
}
