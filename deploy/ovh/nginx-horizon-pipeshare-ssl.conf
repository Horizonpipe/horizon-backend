# PipeShare TLS vhost — install AFTER certbot succeeds (setup-pipeshare-tls.sh).
# Replaces nginx-horizon-pipeshare.conf HTTP-only domain blocks with HTTPS + HTTP→HTTPS redirects.

upstream horizon_node {
    least_conn;
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream horizon_node_saas {
    least_conn;
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream horizon_node_sticky {
    ip_hash;
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream horizon_node_saas_sticky {
    ip_hash;
    server 127.0.0.1:3001;
    keepalive 32;
}

# --- IP fallback (HTTP) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /var/log/nginx/horizon-access.log;
    error_log  /var/log/nginx/horizon-error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript application/javascript application/json
        application/xml image/svg+xml font/woff2;

    root /opt/horizon/horizon-frontend;

    location ^~ /horizonpipe-cpanel/ {
        alias /opt/horizon/horizon-frontend/horizonpipe-cpanel/;
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /client-portal/ {
        alias /opt/horizon/horizon-frontend/client-portal/;
        try_files $uri $uri/ @node;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2|wasm|map)$ {
        gzip_static on;
        try_files $uri @node;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location ~* \.html$ {
        try_files $uri @node;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    location /assets/ {
        try_files $uri @node;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ @node;
    }

    location @node {
        proxy_pass http://horizon_node_sticky;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }
}

# --- HTTP → HTTPS (pipeshare.live) ---
server {
    listen 80;
    listen [::]:80;
    server_name pipeshare.live www.pipeshare.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://pipeshare.live$request_uri;
    }
}

# --- HTTP → HTTPS (pipeshare.net) ---
server {
    listen 80;
    listen [::]:80;
    server_name pipeshare.net www.pipeshare.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://pipeshare.net$request_uri;
    }
}

# --- HTTPS primary (pipeshare.live) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pipeshare.live www.pipeshare.live;

    ssl_certificate     /etc/letsencrypt/live/pipeshare.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pipeshare.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /var/log/nginx/horizon-access.log;
    error_log  /var/log/nginx/horizon-error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript application/javascript application/json
        application/xml image/svg+xml font/woff2;

    root /opt/horizon/horizon-frontend;

    location ^~ /horizonpipe-cpanel/ {
        alias /opt/horizon/horizon-frontend/horizonpipe-cpanel/;
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /client-portal/ {
        alias /opt/horizon/horizon-frontend/client-portal/;
        try_files $uri $uri/ @node_live;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2|wasm|map)$ {
        gzip_static on;
        try_files $uri @node_live;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location ~* \.html$ {
        try_files $uri @node_live;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    location /assets/ {
        try_files $uri @node_live;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ @node_live;
    }

    location @node_live {
        proxy_pass http://horizon_node_sticky;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }
}

