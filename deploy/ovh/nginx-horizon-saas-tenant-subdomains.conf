# SaaS tenant subdomains — PipeShare + PipeSync on {BusinessName}.pipeshare.net
# Requires DNS:
#   *.pipeshare.net  A  -> OVH server IP
# TLS: expand cert with wildcard SAN (DNS-01), e.g.
#   certbot certonly --dns-<provider> -d '*.pipeshare.net' -d pipeshare.net --cert-name pipeshare.live

# --- HTTP: ACME + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<tenant_slug>[a-zA-Z0-9-]+)\.pipeshare\.net$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: {slug}.pipeshare.net -> PipeShare portal + PipeSync (/pipesync.html) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant_slug>[a-zA-Z0-9-]+)\.pipeshare\.net$;

    ssl_certificate     /etc/letsencrypt/live/pipeshare.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pipeshare.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    root /opt/horizon/horizon-frontend;

    location = / {
        return 302 /client-portal/;
    }

    location = /pipesync {
        return 302 /pipesync.html;
    }

    location ^~ /client-portal/ {
        alias /opt/horizon/horizon-frontend/client-portal/;
        try_files $uri $uri/ @tenant_ps_ssl;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2|wasm|map)$ {
        try_files $uri @tenant_ps_ssl;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ~* \.html$ {
        try_files $uri @tenant_ps_ssl;
        expires 5m;
    }

    location / {
        try_files $uri $uri/ @tenant_ps_ssl;
    }

    location @tenant_ps_ssl {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
