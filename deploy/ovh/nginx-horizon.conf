# Install to /etc/nginx/sites-available/horizon then:
#   sudo ln -sf /etc/nginx/sites-available/horizon /etc/nginx/sites-enabled/horizon
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN before enabling. Cert: certbot --nginx -d YOUR_DOMAIN

upstream horizon_node {
    least_conn;
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # certbot fills these after: certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 25m;

    access_log /var/log/nginx/horizon-access.log;
    error_log  /var/log/nginx/horizon-error.log;

    location / {
        proxy_pass http://horizon_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
